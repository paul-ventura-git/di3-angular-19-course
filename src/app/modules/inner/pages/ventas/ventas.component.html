<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0">Registro de Venta</h5>
    </div>
    <div class="card-body">

      <form [formGroup]="formVenta">
        <!-- DATOS GENERALES -->
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Código:</label>
            <input class="form-control" formControlName="codigo">
          </div>
          <div class="col-md-6">
            <label class="form-label">Fecha y hora:</label>
            <input type="datetime-local" class="form-control" formControlName="fechaHora">
          </div>
        </div>
        <div class="row">
          <label class="form-label mt-3 mb-2">Datos del cliente:</label>
        </div>
        <div class="row border bg-light pt-2 pb-4 m-1 rounded">
          <div class="col-md-6">
            <label class="form-label">Nombre: </label>
            <input class="form-control" formControlName="nombreCliente">
            <label class="form-label">DNI: </label>
            <input class="form-control" formControlName="dniCliente">
          </div>
          <div class="col-md-6">
            <label class="form-label">Teléfono: </label>
            <input class="form-control" formControlName="telefonoCliente">
            <label class="form-label">Email: </label>
            <input class="form-control" formControlName="emailCliente">
          </div>
        </div>

        <hr class="my-4">

        <h5>Detalle</h5>
        <div class="table-responsive">
          <table class="table table-bordered align-middle">
            <thead class="table-light">
              <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>IGV</th>
                <th>Subtotal</th>
                <th></th>
              </tr>
            </thead>
            <tbody formArrayName="detalle">
              <tr *ngFor="let fila of detalle.controls; let i=index"
              [formGroupName]="i">
                <td>
                  <select class="form-select"
                  formControlName="producto"
                  (change)="seleccionarProducto(i)">
                    <option value="">Seleccione</option>
                    <option *ngFor="let p of productos"
                    [value]="p.title">
                      {{p.title}}
                    </option>
                  </select>
                </td>
                <td>
                  <input class="form-control"
                  formControlName="precio"
                  readonly>
                </td>
                <td>
                  <input type="number"
                  class="form-control"
                  formControlName="cantidad"
                  min="1"
                  step="1"
                  (input)="calcularFila(i)">
                </td>
                <td>
                  <input class="form-control"
                  formControlName="igv"
                  readonly>
                </td>
                <td>
                  <input class="form-control"
                  formControlName="subtotal"
                  readonly>
                </td>
                <td class="text-center">
                  <button type="button"
                  class="btn btn-danger btn-sm"
                  (click)="eliminarProducto(i)">
                    Eliminar
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <button
          type="button"
          class="btn btn-outline-primary"
          (click)="agregarProducto()"
        >
          Agregar producto
        </button>

        <hr class="my-4">

        <div class="row">
          <div class="col-md-4 ms-auto">
            <label class="form-label fw-bold">Monto Total</label>
            <input
              class="form-control form-control-lg text-end"
              formControlName="monto"
              readonly
            >
          </div>
        </div>
        <button type="submit" class="btn btn-primary mt-4" [disabled]="formVenta.invalid">
          Registrar Venta
        </button>
      </form>
    </div>
  </div>
</div>
