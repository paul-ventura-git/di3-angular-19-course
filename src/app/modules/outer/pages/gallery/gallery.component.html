<div class="container py-4" [formGroup]="filterForm">

<!-- HEADER -->

<div class="d-flex justify-content-between mb-4 mt-4 align-items-center">

<div>
<h2 class="fw-semibold">Catálogo</h2>
</div>

<select
class="form-select form-select-sm w-auto"
formControlName="sort">

<option value="relevance">Ordenar</option>
<option value="priceAsc">Precio menor</option>
<option value="priceDesc">Precio mayor</option>
<option value="rating">Mejor valorados</option>

</select>

</div>


<div class="row g-4">

<!-- SIDEBAR -->

<aside class="col-lg-3">

<div class="border rounded p-3 shadow-sm position-sticky"
style="top:20px">

<h6 class="fw-semibold mb-3">Filtros</h6>

<div class="mb-3">
<label class="form-label small">Buscar</label>
<input
class="form-control form-control-sm"
formControlName="search">
</div>


<div class="mb-3">
<label class="form-label small">Categoría</label>

<select
class="form-select form-select-sm"
formControlName="category">

<option value="">Todas</option>
<option>Electrónica</option>
<option>Hogar</option>
<option>Oficina</option>
<option>Accesorios</option>

</select>

</div>


<div class="mb-3">
<label class="form-label small">Precio</label>

<div class="row g-2">

<div class="col">
<input
type="number"
class="form-control form-control-sm"
placeholder="Min"
formControlName="minPrice">
</div>

<div class="col">
<input
type="number"
class="form-control form-control-sm"
placeholder="Max"
formControlName="maxPrice">
</div>

</div>

</div>


<div class="mb-3">

<label class="form-label small">Rating mínimo</label>

<select
class="form-select form-select-sm"
formControlName="rating">

<option value="">Todos</option>
<option [value]="5">★★★★★</option>
<option [value]="4">★★★★+</option>
<option [value]="3">★★★+</option>

</select>

</div>


<div class="form-check mb-2">

<input
class="form-check-input"
type="checkbox"
formControlName="inStock">

<label class="form-check-label small">
En stock
</label>

</div>


<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox"
formControlName="onSale">

<label class="form-check-label small">
En oferta
</label>

</div>

</div>

</aside>



<!-- GRID -->

<section class="col-lg-9">

<div class="row g-4">

<div
class="col-xl-3 col-md-4 col-sm-6"
*ngFor="let p of filteredProducts">

<div class="card h-100 shadow-sm border-0 product-card">

<div class="position-relative">

<img
[src]="p.image"
class="card-img-top">

<span
*ngIf="p.onSale"
class="badge bg-dark position-absolute top-0 start-0 m-2">
Best Seller
</span>

</div>


<div class="card-body">

<h6 class="card-title">
{{p.name}}
</h6>

<div class="text-warning small mb-1">
<span *ngFor="let s of [].constructor(p.rating)">★</span>
</div>

<p class="text-body-secondary small">
{{p.description}}
</p>


<div class="d-flex align-items-center gap-2">

<span class="fw-semibold">
${{p.price}}
</span>

<span
*ngIf="p.oldPrice"
class="text-decoration-line-through small text-body-secondary">
${{p.oldPrice}}
</span>

</div>

</div>

</div>

</div>

</div>

</section>

</div>

</div>
