<div class="container py-4" [formGroup]="filterForm">

<div class="d-flex justify-content-between mb-4 align-items-center">
  <div>
    <h2 class="fw-semibold">Catálogo</h2>
    <p class="text-body-secondary small px-2">
      Marketplace demo
    </p>
  </div>

  <select class="form-select form-select-sm w-auto"
    formControlName="sort"
  >
    <option value="relevance">Ordenar</option>
    <option value="priceAsc">Precio menor</option>
    <option value="priceDesc">Precio mayor</option>
    <option value="rating">Mejor valorados</option>
  </select>
</div>

<div class="row g-4">

<!-- SIDEBAR -->

<aside class="col-lg-3">

<div class="border rounded p-3 shadow-sm position-sticky"
style="top:20px">

<h6 class="fw-semibold mb-3">
Filtros
</h6>


<div class="mb-3">

<label class="form-label small">
Buscar
</label>

<input
class="form-control form-control-sm"
formControlName="search">

</div>


<div class="mb-3">

<label class="form-label small">
Categoría
</label>

<select
class="form-select form-select-sm"
formControlName="category">

<option value="">
Todas
</option>

<option
*ngFor="let c of categories"
[value]="c">

{{c}}

</option>

</select>

</div>


<div class="mb-3">

<label class="form-label small">
Precio
</label>

<div class="row g-2">

<div class="col">
<input
type="number"
class="form-control form-control-sm"
placeholder="Min"
formControlName="minPrice">
</div>

<div class="col">
<input
type="number"
class="form-control form-control-sm"
placeholder="Max"
formControlName="maxPrice">
</div>

</div>

</div>


<div class="mb-3">

<label class="form-label small">
Rating mínimo
</label>

<select
class="form-select form-select-sm"
formControlName="rating">

<option value="">Todos</option>
<option [value]="4">★★★★+</option>
<option [value]="3">★★★+</option>

</select>

</div>


<div class="form-check mb-3">

<input
type="checkbox"
class="form-check-input"
formControlName="inStock">

<label class="form-check-label small">
En stock
</label>

</div>


<div class="d-grid gap-2">

<button
class="btn btn-primary btn-sm"
type="button"
(click)="applyFilters()">

Aplicar

</button>

<button
class="btn btn-outline-secondary btn-sm"
type="button"
(click)="resetFilters()">

Limpiar filtros

</button>

</div>

</div>

</aside>



<!-- PRODUCT GRID -->

<section class="col-lg-9">

<div class="row g-4">

<div
class="col-xl-3 col-md-4 col-sm-6"
*ngFor="let p of visibleProducts">

<div class="card h-100 shadow-sm border-0">

<img
[src]="p.thumbnail"
class="card-img-top">

<div class="card-body">

<h6 class="card-title">
{{p.title}}
</h6>

<div class="text-warning small mb-1">

<span *ngFor="let r of getStars(p.rating)">★</span>

</div>

<p class="text-body-secondary small">
{{p.description | slice:0:80}}...
</p>


<div class="d-flex align-items-center gap-2">

<span class="fw-semibold">

${{p.price}}

</span>

<span class="badge bg-secondary">

-{{p.discountPercentage | number:'1.0-0'}}%

</span>

</div>

</div>

</div>

</div>

</div>



<div *ngIf="loading"
class="text-center mt-4">

<div class="spinner-border"></div>

</div>


<div *ngIf="visibleProducts.length===0"
class="text-center mt-5 text-body-secondary">

No se encontraron productos

</div>

</section>

</div>

</div>
